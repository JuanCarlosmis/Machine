<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Dislexia - Acceso Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: none;
        }
        .btn-login {
            background-color: #4a69bd;
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            width: 100%;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: scale(1.05);
            background-color: #3c55a5;
            color: white;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 class="mb-4" style="color: #2c3e50;">Acceso Clínico</h2>
        
        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="usuario" class="form-control" placeholder="Usuario del docente" required>
            <input type="password" name="contrasena" class="form-control" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-login mt-3">Ingresar al Sistema</button>
        </form>
    </div>

</body>
</html>
