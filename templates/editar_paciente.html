<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); min-height: 100vh; padding: 40px 0; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.4); padding: 30px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-panel">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 style="color: #2c3e50;">Editar Estudiante</h2>
                    <a href="/dashboard" class="btn btn-outline-danger">Cancelar</a>
                </div>
                <hr>
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}
                <form action="/editar_paciente/{{ paciente.id_paciente }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombres</label>
                        <input type="text" name="nombres" class="form-control" value="{{ paciente.nombres }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Apellidos</label>
                        <input type="text" name="apellidos" class="form-control" value="{{ paciente.apellidos }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">DNI</label>
                        <input type="text" name="dni" class="form-control" value="{{ paciente.dni }}" placeholder="Ej: 12345678" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" required title="DNI debe tener exactamente 8 dígitos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Edad</label>
                        <input type="number" name="edad" class="form-control" value="{{ paciente.edad }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
